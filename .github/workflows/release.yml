name: release

# CI + release in one workflow:
#   - push to main / PR / manual run  -> build BOTH platforms as CI (the publish job is skipped).
#   - push a v* tag                    -> build AND publish a GitHub Release with both assets:
#       git tag v0.2.0 && git push origin v0.2.0
# The in-app "Check for updates" reads the published release (Windows picks the *win*.exe asset).

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y
      - name: Package (exe + scripts + payload + node runtime + installer)
        shell: pwsh
        run: ./gui/windows/package.ps1
      - uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: gui/windows/dist/ClaudeRTL-Setup-*.exe
          if-no-files-found: error

  build-macos:
    # macOS 26 runner → SDK 26, so the menu-bar panel adopts the Liquid Glass design (rounded,
    # flush). `macos-latest` can still resolve to macOS 15 (SDK 15), which builds the app against
    # the OLD SDK and ships the LEGACY square chrome with a sizing gap on macOS 26 — the regression
    # that shipped in the v0.2.13 .dmg. Liquid Glass is a BUILD-SDK opt-in, independent of the
    # deployment target (kept at macOS 13), so the SDK the runner builds against is the whole fix.
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - name: Pin & verify the macOS 26 SDK (Liquid Glass — fail loud if missing)
        run: |
          # Build against the newest Xcode on the runner, then HARD-FAIL if its SDK is < 26 — so a
          # future runner-image change can never silently regress the chrome back to square again.
          XC="$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)"
          [ -n "$XC" ] && sudo xcode-select -s "$XC"
          echo "Active developer dir: $(xcode-select -p)"
          SDK="$(xcrun --sdk macosx --show-sdk-version)"
          echo "macOS SDK: $SDK"
          [ "${SDK%%.*}" -ge 26 ] || { echo "::error::macOS SDK $SDK < 26 — the .app would ship legacy square chrome, not Liquid Glass"; exit 1; }
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Free disk space
        run: |
          sudo rm -rf ~/Library/Developer/CoreSimulator/Devices/* 2>/dev/null || true
          sudo rm -rf ~/Library/Developer/Xcode/DerivedData/* 2>/dev/null || true
          sudo rm -rf /Library/Developer/CoreSimulator/Volumes/* 2>/dev/null || true
          sudo xcrun simctl delete unavailable 2>/dev/null || true
          df -h /
      - name: Build .app + .dmg
        run: bash gui/make-dmg.sh
      - uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: gui/dist/Claude-RTL-*.dmg
          if-no-files-found: error

  release:
    needs: [build-windows, build-macos]
    # Publish ONLY for a v* tag. On push/PR/manual runs this job is skipped, so the builds act as
    # pure CI and nothing is ever published without an explicit tag.
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/windows-installer/*
            artifacts/macos-dmg/*
          generate_release_notes: true
          fail_on_unmatched_files: true
